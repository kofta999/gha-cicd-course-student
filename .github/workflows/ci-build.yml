name: CI and Build Task

on:
  # Run automatically when app code, tests, or this workflow file changes.
  push:
    paths:
      - "app/**"
      - "tests/**"
      - ".github/workflows/ci-build.yml"
  workflow_dispatch:

jobs:
  run-tests:
    # The runner is the temporary machine that executes the steps below.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["threeEleven", "threeTwelve"]

    steps:
      - name: Check out repository
        # Download the repository contents onto the runner.
        uses: actions/checkout@v6

      - name: Set up Python
        # Prepare Python on the runner. This does not change the student laptop.
        uses: actions/setup-python@v6
        with:
          python-version: ${{ secrets[matrix.python-version] }}

      - name: Run tests
        # This is the key verification step in the CI workflow.
        run: python -m unittest discover -s tests -v

      - name: List repo files
        run: pwd && ls -la

      - name: Get Python version
        run: python --version

      - name: Get current datetime
        run: date

  build-package:
    # Use a fresh GitHub-hosted runner for the build.
    runs-on: ubuntu-latest
    needs: run-tests

    env:
      # Keep common image values in one place so the build steps stay readable.
      IMAGE_NAME: tiny-health-app
      IMAGE_TAR: tiny-health-app.tar
      ARTIFACT_NAME: tiny-health-app-image

    steps:
    - name: Check out repository
      # Get the repository files onto the runner.
      uses: actions/checkout@v6

    - name: Set up Python
      # Prepare Python so the workflow can run the tests first.
      uses: actions/setup-python@v6
      with:
        python-version: "3.12"

    - name: Run tests
      # Build only after the verification step passes.
      run: python -m unittest discover -s tests -v

    - name: Set image tag
      # Create one simple tag so the image is easy to identify in this run.
      id: image-tag
      run: |
        IMAGE_TAG="run-${GITHUB_RUN_NUMBER}"
        echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

    - name: Build Docker image
      uses: docker/build-push-action@v7
      with:
        push: false
        tags: ${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.image_tag }}

    # - name: Build Docker image with docker build
    #   # Create the packaged application image with one traceable tag.
    #   # The deploy workflow will run this exact same tag later.
    #   run: |
    #     docker build \
    #       -t "${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}" \
    #       .

    - name: Save Docker image as artifact file
      # Convert that exact tagged image into a file that can be reused later.
      run: docker save "${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}" -o "${IMAGE_TAR}"

    - name: Upload build artifact
      # Store the packaged output so a later workflow can use the exact same package.
      uses: actions/upload-artifact@v4
      with:
        name: ${{ env.ARTIFACT_NAME }}
        path: ${{ env.IMAGE_TAR }}
        retention-days: 7

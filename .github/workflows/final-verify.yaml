name: Verify
on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    types: [opened]

jobs:
  verify:
    # CI still starts by checking whether the change is safe.
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -v

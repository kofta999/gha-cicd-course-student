# This first workflow is intentionally tiny.
# It helps students see what a GitHub Actions run looks like.
name: 01 Hello Workflow

# This or either use a branch protection rule with push
on:
  pull_request:
    branches:
      - main
    types:
      - closed
  workflow_dispatch:

jobs:
  say-hello:
    if: github.event.pull_request.merged == true
    # GitHub provides a fresh runner for the job.
    runs-on: ubuntu-latest

    steps:
      - name: Say hello
        # This single step is enough to show a full workflow run.
        run: echo "こんにちは from GitHub Actions 123"
